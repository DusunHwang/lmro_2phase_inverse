# ============================================================
# env.yaml  —  시스템별 환경 설정
# 다른 시스템으로 이식 시 이 파일만 수정하면 됩니다.
# ============================================================

# --- Python 환경 ---
python:
  venv_path: ".venv"                  # 가상환경 경로 (상대 or 절대)
  # conda_env: "lmro2phase"           # conda 사용 시 주석 해제

# --- PyTorch ---
torch:
  # CPU만 사용하려면 index_url을 비워두세요.
  # CUDA 12.1: https://download.pytorch.org/whl/cu121
  # CUDA 11.8: https://download.pytorch.org/whl/cu118
  # ROCm 6.0:  https://download.pytorch.org/whl/rocm6.0
  index_url: ""                        # "" = CPU / pip 기본
  device: "auto"                       # "auto" | "cpu" | "cuda" | "cuda:0"

# --- 병렬화 ---
parallel:
  n_jobs: 4                            # batch_simulate 병렬 워커 수
  pybamm_nthreads: 1                   # PyBaMM 내부 스레드 (OMP_NUM_THREADS)

# --- 경로 ---
paths:
  data_root: "data"
  raw_data:  "data/raw/toyo"
  processed: "data/processed"
  synthetic: "data/synthetic"
  models:    "data/models"
  reports:   "data/reports"

# --- 재현성 ---
seed: 42

# --- 로깅 ---
log_level: "INFO"                      # DEBUG | INFO | WARNING
